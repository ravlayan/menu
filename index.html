<!DOCTYPE html>
<html>
<head>
  <title>PDF</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden; /* no outer scroll */
      background: black;
    }

    .container {
      width: 100%;
      height: 100%;
    }

    embed {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<div class="container">
  <embed src="offer.pdf#toolbar=0&navpanes=0&scrollbar=0&view=FitH">
</div>

</body>
</html>
